spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} # Mặc định là profile 'dev' nếu không được truyền vào
  
  # ==================== DATABASE ====================
  # Cấu hình kết nối MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/e_medical_booking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== MAIL ====================
  # Dùng Gmail SMTP để gửi email (xác nhận đặt lịch, quên mật khẩu...)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:biconghi123@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true # Bật mã hóa TLS khi gửi mail

# ==================== JWT ====================
# Cấu hình riêng (không phải của Spring) - JwtTokenProvider đọc 2 giá trị này
app:
  jwt:
    # Key dài 64 ký tự hex (256 bits) an toàn cho HS256
    secret: ${JWT_SECRET:8a4b6c3d9e2f1a5d8b7c4e1f2a3d9b6c8a4b6c3d9e2f1a5d8b7c4e1f2a3d9b6c}
    expiration-ms: 86400000 # 24h

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}

  booking:
    # AES-256 key dùng mã hoá token gửi qua email (tối thiểu 32 ký tự)
    token-secret: ${BOOKING_TOKEN_SECRET:eMedBook@2026#SecretKey!AES256OK}
    # Thời gian hiệu lực của token xác nhận đặt lịch (phút)
    token-expiry-minutes: 5

# ==================== SERVER ====================
server:
  port: 8888
  tomcat:
    max-http-form-post-size: 20MB
    max-swallow-size: 20MB
